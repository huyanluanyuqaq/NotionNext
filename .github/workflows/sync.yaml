name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 00:00 自动运行
  workflow_dispatch: # 支持手动触发

jobs:
  sync_latest_from_upstream:
    name: Sync upstream and merge to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/tangly1024/NotionNext.git
          git fetch upstream

      - name: Create/update upstream branch (pure upstream code)
        run: |
          git branch -f upstream upstream/main
          git push origin upstream --force

      - name: Merge upstream into main (keep your custom changes)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 将 upstream/main 合并到 main
          # 你的自定义修改不会被覆盖，只会合并上游的新代码
          # 如果有冲突，会暂停并报错，需要你手动解决
          git merge upstream/main --no-edit || echo "CONFLICT_DETECTED=true" >> $GITHUB_ENV

      - name: Push main
        if: success()
        run: |
          git push origin main

      - name: Sync wiki branch (mirror of main)
        if: success()
        run: |
          git branch -f wiki origin/main
          git push origin wiki --force

      - name: Push tags
        if: success()
        run: git push --tags

      - name: Push upstream branch
        if: success()
        run: git push origin upstream --force

      - name: Conflict detected notification
        if: env.CONFLICT_DETECTED == 'true'
        run: |
          echo "::error::合并冲突！请手动解决 main 分支的冲突"
          echo "操作步骤："
          echo "1. git checkout main"
          echo "2. git merge upstream/main"
          echo "3. 解决冲突后 git add . && git commit"
          echo "4. git push origin main"
          exit 1

      - name: Sync check
        if: failure() && env.CONFLICT_DETECTED != 'true'
        run: |
          echo "[Error] 同步失败，需要手动处理"
          exit 1